app = "radiology-report-simplifier-api"
primary_region = "fra"

[build]

[env]
  APP_ENV = "production"
  API_TITLE = "Radiology Report Simplifier API"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
